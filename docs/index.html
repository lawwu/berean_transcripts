<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Berean Community Church Transcripts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Vendored sql.js-fts5 build: the official sql.js dist lacks FTS5,
         which the transcript shards require -->
    <script src="./assets/sqljs/sql-wasm.js" defer></script>
    <script src="./assets/app.js" defer></script>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div>
          <h1>Berean Community Church Transcripts</h1>
          <p>
            Search every sermon, Bible study, and service since 2011. These
            transcripts are automatically generated using Whisper.
          </p>
        </div>
        <div class="search">
          <div class="search-row">
            <input
              id="query"
              type="search"
              placeholder="Search the archive, e.g. grace, Romans 8, prayer..."
              autocomplete="off"
            />
            <button class="btn" id="search">Search</button>
            <button class="btn secondary" id="latest">Latest messages</button>
          </div>
          <div class="filters" id="filters"></div>
          <div class="filters">
            <button class="link-pill" id="select-all" type="button">
              Select all years
            </button>
            <button class="link-pill" id="select-none" type="button">
              Clear years
            </button>
            <a class="link-pill" href="./legacy_index.html">Full archive list</a>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="status" id="status">Loading...</div>
        <div class="results" id="results"></div>
        <div class="viewer" id="viewer" hidden>
          <h2 id="viewer-title"></h2>
          <div class="meta" id="viewer-meta"></div>
          <div class="viewer-body" id="viewer-body"></div>
        </div>
      </section>
    </main>
  </body>
</html>
